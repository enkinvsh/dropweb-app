name: build-macos

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
          flutter-version: 3.32.8

      - name: Configure CI code signing
        run: |
          echo 'CODE_SIGN_IDENTITY = -' > macos/Runner/Configs/Local.xcconfig

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build macOS
        run: dart run setup.dart macos --arch arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dropweb-macos-arm64
          path: dist/
